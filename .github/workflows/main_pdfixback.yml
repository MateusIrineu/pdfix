# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pdfixBack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: npm install
        run: npm install

      - name: Create deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r src deploy/
          cp -r auth deploy/
          cp -r scripts deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp .sequelizerc deploy/ 2>/dev/null || true
          cp .deployment deploy/ 2>/dev/null || true
          cp startup.sh deploy/ 2>/dev/null || true
          cp config.cjs deploy/ 2>/dev/null || true
          chmod +x deploy/startup.sh
          # Criar .env vazio - as variáveis virão do Azure
          touch deploy/.env
          echo "Arquivos para deploy:"
          ls -la deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_92B33C2C8C7248A88327F61130C2E4E5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_461BB48D1D964DF29136675D9DBC7353 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E786BFEEF61C4345A31B2F79ECEDD50A }}

      - name: Wait for SCM to be ready
        run: sleep 30

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pdfixBack'
          slot-name: 'Production'
          package: .
          clean: true

      - name: Deployment successful
        run: echo "✅ Deployment completed! Configure startup command in Azure Portal."
          